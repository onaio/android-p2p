name: Publish to Maven Central

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'          # release: e.g. v1.0.0
      - 'v[0-9]*.[0-9]*.[0-9]*-SNAPSHOT' # snapshot: e.g. v1.0.0-SNAPSHOT

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Strip leading 'v' prefix if present (e.g. v1.0.0 -> 1.0.0)
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "IS_SNAPSHOT=true" >> $GITHUB_OUTPUT
          else
            echo "IS_SNAPSHOT=false" >> $GITHUB_OUTPUT
          fi

      # Sonatype OSSRH does not require GPG signing for snapshot repositories,
      # so signing secrets are intentionally omitted here. Signing is only
      # enforced for release artifacts that go through the staging repository.
      - name: Publish SNAPSHOT to Maven Central
        if: steps.version.outputs.IS_SNAPSHOT == 'true'
        run: ./gradlew publish "-PversionName=${{ steps.version.outputs.VERSION }}"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Stage Release artifacts locally
        if: steps.version.outputs.IS_SNAPSHOT == 'false'
        run: ./gradlew publish "-PversionName=${{ steps.version.outputs.VERSION }}"
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload Release bundle to Maven Central Portal
        if: steps.version.outputs.IS_SNAPSHOT == 'false'
        run: |
          cd p2p-lib/build/staging-deploy
          zip -r ../bundle.zip .
          curl --fail --request POST \
            --header "Authorization: Bearer $(printf '%s' '${{ secrets.MAVEN_CENTRAL_USERNAME }}:${{ secrets.MAVEN_CENTRAL_PASSWORD }}' | base64 -w0)" \
            --form bundle=@../bundle.zip \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"
