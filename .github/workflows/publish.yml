name: Publish to Maven Central

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Strip leading 'v' prefix if present (e.g. v1.0.0 -> 1.0.0)
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "IS_SNAPSHOT=true" >> $GITHUB_OUTPUT
          else
            echo "IS_SNAPSHOT=false" >> $GITHUB_OUTPUT
          fi

      # Sonatype OSSRH does not require GPG signing for snapshot repositories,
      # so signing secrets are intentionally omitted here. Signing is only
      # enforced for release artifacts that go through the staging repository.
      - name: Publish SNAPSHOT to Maven Central
        if: steps.version.outputs.IS_SNAPSHOT == 'true'
        run: ./gradlew publishToSonatype "-PversionName=${{ steps.version.outputs.VERSION }}"
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Publish Release to Maven Central
        if: steps.version.outputs.IS_SNAPSHOT == 'false'
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository "-PversionName=${{ steps.version.outputs.VERSION }}"
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
